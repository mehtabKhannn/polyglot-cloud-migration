version: '3.8'

services:
  frontend:
    build:
      context: ./frontend-js
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:5000

  backend:
    build:
      context: ./backend-dotnet
    ports:
      - "5000:8080"
    environment:
      - REDIS_CONNECTION=redis:6379
    depends_on:
      - redis

  worker:
    build:
      context: ./worker-python
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
