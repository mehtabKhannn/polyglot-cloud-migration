name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd worker-python
          pip install -r requirements.txt
          pip install pytest flake8

      - name: Run pytest
        run: |
          cd worker-python
          pytest --tb=short

      - name: Run flake8
        run: |
          cd worker-python
          flake8 . --max-line-length=120 --exclude=__pycache__,.pytest_cache

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd frontend-js
          npm install

      - name: Run tests
        run: |
          cd frontend-js
          npm test -- --watchAll=false --passWithNoTests

      - name: Run lint
        run: |
          cd frontend-js
          npm run lint -- --max-warnings=100 || true

  build-and-push:
    runs-on: ubuntu-latest
    needs:
      - python-tests
      - frontend-tests
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend-js
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/polyglot-frontend:latest

      - name: Push Backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend-dotnet
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/polyglot-backend:latest

      - name: Push Worker image
        uses: docker/build-push-action@v6
        with:
          context: ./worker-python
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/polyglot-worker:latest