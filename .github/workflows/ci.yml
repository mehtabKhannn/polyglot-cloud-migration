name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Python Tests
      run: |
        cd worker-python
        pip install -r requirements.txt pytest
        pytest --tb=short

    - name: Python Linting
      run: |
        cd worker-python
        pip install flake8
        flake8 . --max-line-length=120 --exclude=__pycache__,.pytest_cache

    - name: Frontend Install and Test
      run: |
        cd frontend-js
        npm install
        npm test -- --watchAll=false --passWithNoTests

    - name: Frontend Linting
      run: |
        cd frontend-js
        npm run lint -- --max-warnings=100 || true

  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Frontend Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend-js
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/polyglot-frontend:latest

    - name: Build and push Backend Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./backend-dotnet
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/polyglot-backend:latest

    - name: Build and push Worker Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./worker-python
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/polyglot-worker:latest
