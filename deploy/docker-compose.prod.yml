version: '3.8'

services:
  frontend:
    image: ${DOCKER_USERNAME}/polyglot-frontend:latest
    ports:
      - "3000:80"
    restart: always
    depends_on:
      - backend

  backend:
    image: ${DOCKER_USERNAME}/polyglot-backend:latest
    ports:
      - "5000:8080"
    environment:
      - REDIS_CONNECTION=redis:6379
    restart: always
    depends_on:
      - redis

  worker:
    image: ${DOCKER_USERNAME}/polyglot-worker:latest
    environment:
      - REDIS_URL=redis://redis:6379/0
    restart: always
    depends_on:
      - redis

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - redis_data:/data

volumes:
  redis_data:
